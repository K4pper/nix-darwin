format = """
$username \
$directory \
$kubernetes \
$git_branch \
$git_status \
$fill \n   \
[уұһӘ ](fg:iris)
"""
palette = "rose-pine"

[palettes.rose-pine]
overlay = '#26233a'
love = '#eb6f92'
gold = '#f6c177'
rose = '#ebbcba'
pine = '#31748f'
foam = '#9ccfd8'
iris = '#c4a7e7'

[directory]
format = "[оӮ¶](fg:overlay)[ $path ]($style)[оӮҙ](fg:overlay)"
style = "bg:overlay fg:pine"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
Documents = "у°Ҳҷ"
Downloads = "пҖҷ "
Music = "пҖҒ "
Pictures = "пҖҫ "

[fill]
style = "fg:overlay"
symbol = " "

[git_branch]
format = "[оӮ¶](fg:overlay)[ $symbol $branch ]($style)[оӮҙ](fg:overlay)"
style = "bg:overlay fg:foam"
symbol = "пҗҳ"

[git_status]
style = "bg:overlay fg:love"
format = '[оӮ¶](fg:overlay)[$all_status$ahead_behind]($style)[оӮҙ](fg:overlay)'
disabled = false
up_to_date = "вң“"

[username]
disabled = false
format = "[оӮ¶](fg:overlay)[ у°§ұ $user ]($style)[оӮҙ](fg:overlay)"
show_always = true
style_root = "bg:overlay fg:iris"
style_user = "bg:overlay fg:iris"

[kubernetes]
symbol = 'вҳё '
format = '[оӮ¶](fg:overlay)[$symbol$context( \($namespace\))]($style)[оӮҙ](fg:overlay)'
disabled = false
style = "bg:overlay fg:foam"
